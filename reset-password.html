<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — SolyntraAI</title>
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./assets/style.css" />
    <script src="/.netlify/functions/config"></script>
    <style>.auth{min-height:calc(100vh - 70px);display:grid;place-items:center;}.card{width:min(520px,calc(100% - 28px));padding:18px;position:relative;z-index:1;}</style>
  </head>
  <body>
    <header class="site-header"><div class="container nav-wrap"><a class="brand" href="index.html"><span class="brand-badge"></span><span class="logo"><span class="logo-metal">Solyntra AI</span></span></a></div></header>
    <main class="auth">
      <section class="glass-card card">
        <h1 class="heading">Set new password</h1>
        <form id="reset-form" class="form" style="margin-top:10px;">
          <div class="field"><label class="label" for="new-password">New password</label><input id="new-password" class="input" type="password" required /></div>
          <div class="field"><label class="label" for="confirm-password">Confirm password</label><input id="confirm-password" class="input" type="password" required /></div>
          <div id="reset-msg" class="helper"></div>
          <button class="btn btn-primary btn-block" type="submit">Update Password</button>
        </form>
      </section>
    </main>
    <script type="module">
      import { supabase } from "./supabase.js";
      document.addEventListener("DOMContentLoaded", async () => {
        const form = document.getElementById("reset-form");
        const msg = document.getElementById("reset-msg");
        form?.addEventListener("submit", async (e) => {
          e.preventDefault();
          const newPass = document.getElementById("new-password").value;
          const confirm = document.getElementById("confirm-password").value;
          if (newPass !== confirm) { msg.textContent = "Passwords do not match."; return; }
          if (newPass.length < 8) { msg.textContent = "Password must be at least 8 characters."; return; }
          const { error } = await supabase.auth.updateUser({ password: newPass });
          if (error) { msg.textContent = error.message; return; }
          msg.textContent = "✅ Password updated! Redirecting to login…"; msg.style.color = "#00ff9d";
          setTimeout(() => window.location.href = "login.html", 2000);
        });
      });
    </script>
  </body>
</html>
