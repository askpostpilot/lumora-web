<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — SolyntraAI</title>
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./assets/style.css" />
    <script src="/.netlify/functions/config"></script>
    <style>.auth{min-height:calc(100vh - 70px);display:grid;place-items:center;}.card{width:min(520px,calc(100% - 28px));padding:18px;position:relative;z-index:1;}</style>
  </head>
  <body>
    <header class="site-header"><div class="container nav-wrap"><a class="brand" href="index.html"><span class="brand-badge"></span><span class="logo"><span class="logo-metal">Solyntra AI</span></span></a></div></header>
    <main class="auth">
      <section class="glass-card card">
        <h1 class="heading">Reset password</h1>
        <p class="muted">Enter your email to receive a reset link.</p>
        <p id="reset-message" style="display:none; margin-top:1rem;"></p>
        <form id="forgot-form" class="form" style="margin-top:10px;">
          <div class="field"><label class="label" for="email">Email</label><input id="email" class="input" type="email" required /></div>
          <button class="btn btn-primary btn-block" type="submit">Send Reset Link</button>
        </form>
      </section>
    </main>
    <script src="./assets/js/main.js"></script>
    <script type="module">
      import { resetPassword } from "./supabase.js";
      const form = document.getElementById("forgot-form");
      const btn = form?.querySelector('button[type="submit"]');
      const msg = document.getElementById("reset-message");
      form?.addEventListener("submit", async (e)=>{ e.preventDefault(); const email=document.getElementById("email")?.value?.trim(); if(!email) return;
        if(btn){ btn.disabled=true; btn.textContent="Sending…"; }
        try { await resetPassword(email); if(msg){ msg.textContent="✅ Reset link sent! Check your inbox."; msg.style.color="#00ff9d"; msg.style.display="block"; } form.reset(); }
        catch(err){ if(msg){ msg.textContent=err.message || "Failed to send reset email."; msg.style.color="#ff5e57"; msg.style.display="block"; } }
        finally { if(btn){ btn.disabled=false; btn.textContent="Send Reset Link"; } }
      });
    </script>
  </body>
</html>
