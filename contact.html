<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Contact — SolyntraAI</title><link rel="stylesheet" href="./styles/tokens.css"/><link rel="stylesheet" href="./assets/style.css"/><script src="/.netlify/functions/config"></script><style>.wrap{padding:24px 0 56px;position:relative;z-index:1;max-width:700px}.card{padding:18px}</style></head><body><header class="site-header"><div class="container nav-wrap"><a class="brand" href="index.html"><span class="brand-badge"></span><span class="logo"><span class="logo-metal">SolyntraAI</span></span></a></div></header><main class="container wrap"><section class="glass-card card"><h1 class="heading">Contact us</h1><p class="muted">Questions about plans, activation, or support.</p><form class="form" id="contact-form"><div class="field"><label class="label" for="name">Name</label><input class="input" id="name" required/></div><div class="field"><label class="label" for="email">Email</label><input class="input" id="email" type="email" required/></div><div class="field"><label class="label" for="message">Message</label><textarea class="textarea" id="message" required></textarea></div><button class="btn btn-primary" type="submit">Send Message</button><div id="contact-result" class="helper"></div></form></section></main><script src="./assets/js/main.js"></script><script>document.getElementById("contact-form").addEventListener("submit",(e)=>{e.preventDefault();document.getElementById("contact-result").textContent="Thanks! We will reply soon.";e.target.reset();});</script></body></html>
